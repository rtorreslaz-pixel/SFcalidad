<style>
  :root{--sf-navy:#004b93;--sf-blue:#0055B8;--sf-red:#D6001C;--sf-green:#009A44;--sf-amber:#F2A900;--sf-gray:#C6CEDD;--sf-bg:#EEF2F8;--sf-border:#DCE4F0}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  a{color:var(--sf-blue);text-decoration:none}
  a:hover{color:var(--sf-navy)}
</style>

<div style="height:100vh;width:100%;display:flex;flex-direction:column;font-family:var(--font-sans);color:#fff;background:radial-gradient(120% 120% at 100% 0%, #0a5fb0 0%, #004b93 45%, #012f5e 100%);position:relative;overflow:hidden">
  <div style="position:absolute;top:0;right:0;width:46%;height:100%;background:linear-gradient(180deg, rgba(214,0,28,0) 0%, rgba(214,0,28,0.10) 100%);clip-path:polygon(38% 0,100% 0,100% 100%,12% 100%);pointer-events:none"></div>
  <div style="position:absolute;left:-140px;bottom:-140px;width:420px;height:420px;border:60px solid rgba(255,255,255,0.04);border-radius:50%;pointer-events:none"></div>

  <header style="display:flex;align-items:center;gap:14px;padding:22px 56px;position:relative;z-index:2;flex-shrink:0">
    <div style="width:210px;height:56px;border-radius:8px;overflow:hidden;flex-shrink:0"><img src="uploads/san-fernando-logo-png_seeklogo-212281.png" alt="San Fernando" style="width:100%;height:100%;object-fit:cover;object-position:center;transform:scale(1.22)"></div>
    <div style="display:flex;flex-direction:column;line-height:1.05">
      <span style="font-size:15px;font-weight:500;color:#B9C9E8;letter-spacing:2px;text-transform:uppercase">Calidad y Bienestar Animal</span>
    </div>
  </header>

  <main style="flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 56px;position:relative;z-index:2;max-width:1180px;min-height:0">
    <h1 style="margin:0;font-weight:800;font-size:58px;line-height:0.98;letter-spacing:-2px;text-wrap:balance">TERCIOS<br>POLLO VIVO</h1>
    <div style="height:5px;width:120px;background:var(--sf-red);margin:18px 0 16px;border-radius:3px"></div>
    <p style="margin:0;white-space:nowrap;font-size:24.5px;line-height:1.45;color:#DCE6FA;font-weight:400">Evaluación integral del <b style="color:#fff;font-weight:700">1er y 3er tercio</b> de planteles · Calidad y Bienestar Animal</p>

    <div style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:0 60px;margin-top:22px;max-width:760px">
      <div style="padding:10px 0;border-top:1px solid rgba(255,255,255,0.16)"><div style="font-size:14px;letter-spacing:1.5px;text-transform:uppercase;color:#8EA6D6;font-weight:600;margin-bottom:4px">Área</div><div style="font-size:19.5px;font-weight:600">Calidad Pecuario y Bienestar Animal</div></div>
      <div style="padding:14px 0;border-top:1px solid rgba(255,255,255,0.16)"><div style="font-size:14px;letter-spacing:1.5px;text-transform:uppercase;color:#8EA6D6;font-weight:600;margin-bottom:4px">Periodo</div><div style="font-size:19.5px;font-weight:600">2026 · semanas 1–30</div></div>
    </div>
  </main>

  <footer style="padding:0 56px 34px;position:relative;z-index:2;flex-shrink:0">
    <div style="font-size:14px;letter-spacing:2px;text-transform:uppercase;color:#8EA6D6;font-weight:600;margin-bottom:14px">Contenido</div>
    <div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;max-width:1180px">
      <sc-for list="{{ indice }}" as="item" hint-placeholder-count="4">
        <a href="{{ item.href }}" style="display:flex;flex-direction:column;gap:8px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:18px 18px 20px;color:#fff" style-hover="background:rgba(255,255,255,0.14);border-color:rgba(255,255,255,0.28)">

          <span style="font-size:17px;font-weight:600;line-height:1.25">{{ item.title }}</span>
        </a>
      </sc-for>
    </div>
  </footer>
</div>
