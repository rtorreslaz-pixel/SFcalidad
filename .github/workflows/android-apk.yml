# Construye el APK (debug) de la app Android de pesaje y lo publica como artefacto
# descargable, corriendo antes los tests unitarios (parsers de básculas, DTOs, Room).
#
# Cómo obtener el APK: GitHub -> pestaña Actions -> "Android APK" -> el run más reciente
# -> sección "Artifacts" -> descargar "bit-scale-app-debug". Dentro viene app-debug.apk,
# listo para instalar en un celular (requiere permitir "instalar apps de origen desconocido").
name: Android APK

on:
  push:
    branches: [main]
    paths:
      - "android-scale-prototype/**"
      - ".github/workflows/android-apk.yml"
  workflow_dispatch: # permite lanzarlo a mano desde la pestaña Actions

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-scale-prototype
    steps:
      - uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache de Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android-scale-prototype/**/*.gradle.kts', 'android-scale-prototype/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Tests unitarios
        run: ./gradlew --no-daemon testDebugUnitTest

      - name: Construir APK debug
        run: ./gradlew --no-daemon assembleDebug

      - name: Publicar APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: bit-scale-app-debug
          path: android-scale-prototype/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
